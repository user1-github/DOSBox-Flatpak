id: com.dosbox.DOSBox
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: dosbox
finish-args:
  - --device=all
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --persist=.dosbox
  - --filesystem=xdg-documents
cleanup:
  - /include
  - /lib/pkgconfig
  - '*.la'
  - '*.a'
modules:

  - name: glu
    buildsystem: meson
    sources:
