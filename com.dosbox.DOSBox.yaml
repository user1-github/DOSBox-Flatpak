id: com.dosbox.DOSBox
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: dosbox
finish-args:
  - --device=all
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --persist=.dosbox
  - --filesystem=xdg-documents
cleanup:
  - /bin/sdl-config
  - /include
  - /lib/pkgconfig
  - '*.a'
  - '*.la'
modules:

  - name: glu
    buildsystem: meson
    builddir: true
    sources:
      - type: archive
        url: https://archive.mesa3d.org/glu/glu-9.0.3.tar.xz
        sha256: bd43fe12f374b1192eb15fe20e45ff456b9bc26ab57f0eee919f96ca0f8a330f

  - name: sdl12-compat
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://github.com/libsdl-org/sdl12-compat/releases/download/release-1.2.74/sdl12-compat-1.2.74.tar.gz
        sha256: 86b6cb20387209eb487273834c41424a42c56637635ca6c58722e1031b04bee0
